name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium-tests:
    name: Selenium + Java (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    defaults:
      run:
        working-directory: selenium-java-demo

    env:
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: selenium-java-demo/pom.xml

      - name: Run tests (TestNG suite)
        run: mvn -B -ntp clean test

      - name: Generate Allure report
        if: always()
        run: |
          mvn -B -ntp allure:report -DskipTests || true
          if [ ! -d "target/site/allure-maven-plugin" ]; then
            curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
            ./allure-2.27.0/bin/allure generate target/allure-results -o target/allure-report --clean
          fi

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-allure-results-jdk${{ matrix.java }}
          path: selenium-java-demo/target/allure-results
          retention-days: 14

      - name: Upload allure-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-allure-report-jdk${{ matrix.java }}
          path: |
            selenium-java-demo/target/site/allure-maven-plugin
            selenium-java-demo/target/allure-report
          retention-days: 14

  playwright-tests:
    name: Playwright + Python (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    defaults:
      run:
        working-directory: playwright-test-demo

    env:
      HEADLESS: "true"
      BROWSER: ${{ matrix.browser }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: playwright-test-demo/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('playwright-test-demo/requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (${{ matrix.browser }})
        run: python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Run pytest (parallel via xdist)
        run: pytest tests/ -n auto --browser=${{ matrix.browser }} --alluredir=allure-results

      - name: Generate Allure report
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          ./allure-2.27.0/bin/allure generate allure-results -o allure-report --clean

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-results-${{ matrix.browser }}
          path: playwright-test-demo/allure-results
          retention-days: 14

      - name: Upload allure-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-report-${{ matrix.browser }}
          path: playwright-test-demo/allure-report
          retention-days: 14
